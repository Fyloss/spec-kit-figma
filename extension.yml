schema_version: "1.0"

extension:
  id: figma
  name: "Spec Kit Figma"
  version: "1.0.0"
  description: "Agent-agnostic Figma design-context extension for SpecKit. Grounds spec/plan/tasks/implement in Figma. Supports single-repo (default), mono-repo and multi-repo layouts, with REST (default) and optional MCP engines."
  author: "Fyloss"
  repository: "https://github.com/Fyloss/spec-kit-figma"
  license: MIT

requires:
  speckit_version: ">=0.1.0"
  tools:
    - name: bash
      required: true
    - name: curl
      required: true
    - name: jq
      required: true
    - name: git
      required: true

provides:
  commands:
    - name: speckit.figma.setup
      file: commands/speckit.figma.setup.md
      description: "Configure the SpecKit Figma extension for this workspace and validate connectivity before any spec/plan/tasks run."

    - name: speckit.figma.introspect
      file: commands/speckit.figma.introspect.md
      description: "Autonomously introspect the mapped Figma pages for the target package and produce design-grounded context for spec/plan/tasks."

hooks:
  before_specify:
    command: speckit.figma.introspect
    optional: true
    prompt: "Run Figma introspection to inject design context before generating the spec?"
    description: "Inject Figma design context before specification generation"

  before_tasks:
    command: speckit.figma.introspect
    optional: true
    prompt: "Run Figma introspection to inject design context before generating tasks?"
    description: "Inject Figma design context before task generation"

tags:
  - figma
  - design
  - frontend
  - ui
  - design-system
