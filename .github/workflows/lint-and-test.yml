name: Lint & Test

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    name: ShellCheck (lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run ShellCheck
        run: shellcheck -x scripts/bash/*.sh install.sh

  test:
    name: Bash tests (bats)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install bats and jq
        run: |
          sudo apt-get update
          sudo apt-get install -y bats jq

      - name: Verify dependencies
        run: |
          bats --version
          jq --version

      - name: Run test suite
        run: bats --print-output-on-failure tests/

  psscriptanalyzer:
    name: PSScriptAnalyzer (lint)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint the PowerShell ports
        shell: pwsh
        run: |
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser
          $results = @(Invoke-ScriptAnalyzer -Path scripts/powershell -Recurse) +
                     @(Invoke-ScriptAnalyzer -Path install.ps1)
          $results | Format-Table RuleName, Severity, ScriptName, Line -AutoSize
          $errors = @($results | Where-Object Severity -eq 'Error')
          if ($errors.Count -gt 0) {
            Write-Error "PSScriptAnalyzer found $($errors.Count) error(s)."
            exit 1
          }

  test-powershell:
    name: PowerShell tests (Pester, ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Pester 5
        shell: pwsh
        run: |
          Install-Module Pester -Force -Scope CurrentUser -SkipPublisherCheck -MinimumVersion 5.5.0
          Import-Module Pester -MinimumVersion 5.5.0
          (Get-Module Pester).Version

      - name: Run Pester suite
        shell: pwsh
        run: |
          Import-Module Pester -MinimumVersion 5.5.0
          $config = New-PesterConfiguration
          $config.Run.Path = 'tests/powershell'
          $config.Run.Exit = $true
          $config.Output.Verbosity = 'Detailed'
          Invoke-Pester -Configuration $config

      - name: Run the PowerShell validator on the shipped examples
        shell: pwsh
        run: |
          $failed = $false
          foreach ($example in Get-ChildItem 'config/figma.projects.config.*.example.json') {
            Write-Output "Checking $($example.Name)"
            # Exit 2 (unresolved REPLACE_WITH_ placeholders) is expected for
            # shipped examples; only structural errors (exit 1) must fail CI.
            & ./scripts/powershell/figma-validate-config.ps1 $example.FullName
            if ($LASTEXITCODE -ne 0 -and $LASTEXITCODE -ne 2) {
              Write-Output "FAIL: $($example.Name) (exit $LASTEXITCODE)"
              $failed = $true
            }
          }
          if ($failed) { exit 1 }

  config-examples:
    name: Validate example configs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Validate example configs and fixtures against the JSON schema
        run: |
          npx --yes ajv-cli@5 validate --spec=draft7 \
            -s config/figma.projects.config.schema.json \
            -d "config/figma.projects.config.*.example.json" \
            -d "tests/fixtures/*-valid.json"

      - name: Run the runtime validator on the shipped examples
        run: |
          set -euo pipefail
          for example in config/figma.projects.config.*.example.json; do
            echo "Checking ${example}"
            # Exit 2 (unresolved REPLACE_WITH_ placeholders) is expected for
            # shipped examples; only structural errors (exit 1) must fail CI.
            rc=0
            ./scripts/bash/figma-validate-config.sh "${example}" || rc=$?
            if [[ "${rc}" -ne 0 && "${rc}" -ne 2 ]]; then
              echo "FAIL: ${example} (exit ${rc})"
              exit 1
            fi
          done
